<!DOCTYPE html>

<title>Coach John | Anime Nutrition Cheat Sheet</title>
<style>

  body {

    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    max-width: 440px;
    width: 100%;
    background: #131313;
    border: 1px solid #D4AF37;
    border-radius: 14px;
    padding: 36px 28px;
    box-shadow: 0 0 40px rgba(212,175,55,0.08);

  .brand {

    color: #D4AF37;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {

    text-align: center;
    line-height: 1.35;

  .sub {

    font-size: 14px;

    font-size: 13px;
    color: #D4AF37;
    margin-bottom: 6px;

    letter-spacing: 0.5px;
  }
  input {
    width: 100%;
    padding: 13px 14px;
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    outline: none;
  }
  input:focus { border-color: #D4AF37; }
  input::placeholder { color: #666; }
  button {
    width: 100%;
    margin-top: 26px;
    padding: 15px;
    background: #D4AF37;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-transform: uppercase;
  }
  button:hover { background: #c4a02f; }
  .foot {
    text-align: center;
    color: #555;
    font-size: 11px;
    margin-top: 18px;
  }

</head>

  <div class="card">
